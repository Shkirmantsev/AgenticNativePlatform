apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-ops-ui
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 10m
  suspend: true
  dependsOn:
    - name: platform-infrastructure
  sourceRef:
    kind: GitRepository
    name: platform
  path: ./flux/generated/clusters/github-workspace-dev-none-external/weave-gitops
