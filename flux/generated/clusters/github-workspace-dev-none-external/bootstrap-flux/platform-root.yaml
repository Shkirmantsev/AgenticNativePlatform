apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 30m
  sourceRef:
    kind: GitRepository
    name: platform
  path: ./flux/generated/clusters/github-workspace-dev-none-external
