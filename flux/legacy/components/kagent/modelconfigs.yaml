apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: default-model-config
  namespace: kagent
spec:
  apiKeySecret: kagent-agentgateway
  apiKeySecretKey: OPENAI_API_KEY
  model: default-gemini
  provider: OpenAI
  openAI:
    baseUrl: "http://agentgateway.agentgateway-system.svc.cluster.local:8080/v1"
