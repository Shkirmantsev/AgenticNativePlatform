apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway-crds
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: agentgateway-system
  chartRef:
    kind: OCIRepository
    name: agentgateway-crds-chart
    namespace: flux-system
  install:
    createNamespace: true
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: agentgateway-crds
  targetNamespace: agentgateway-system
  chartRef:
    kind: OCIRepository
    name: agentgateway-chart
    namespace: flux-system
  values:
    service:
      type: ClusterIP
