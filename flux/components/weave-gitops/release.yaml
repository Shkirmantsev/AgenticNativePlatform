apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: weave-gitops
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  targetNamespace: flux-system
  chartRef:
    kind: OCIRepository
    name: weave-gitops-chart
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    service:
      type: ClusterIP
    ingress:
      enabled: false
    adminUser:
      create: true
      username: admin
      passwordHash: $2y$10$/fKgRdIol./2hC.U9vnZMeVlrC6XOhUtSsoqHd97k8SG1DRINzvCK
    rbac:
      impersonationResourceNames:
        - admin
