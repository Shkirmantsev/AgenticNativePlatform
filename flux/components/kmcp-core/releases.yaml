apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kmcp-crds
  namespace: flux-system
spec:
  interval: 30m
  timeout: 9m
  targetNamespace: kmcp-system
  chartRef:
    kind: OCIRepository
    name: kmcp-crds-chart
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kmcp
  namespace: flux-system
spec:
  interval: 30m
  timeout: 9m
  dependsOn:
    - name: kmcp-crds
  targetNamespace: kmcp-system
  chartRef:
    kind: OCIRepository
    name: kmcp-chart
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
