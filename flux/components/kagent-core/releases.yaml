apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: kagent
  chartRef:
    kind: OCIRepository
    name: kagent-crds-chart
    namespace: flux-system
  install:
    createNamespace: true
  values:
    kmcp:
      enabled: false
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 30m
  dependsOn:
    - name: kagent-crds
  targetNamespace: kagent
  chartRef:
    kind: OCIRepository
    name: kagent-chart
    namespace: flux-system
  values:
    kmcp:
      enabled: false
