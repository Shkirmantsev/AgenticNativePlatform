apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent-crds
  namespace: flux-system
spec:
  interval: 30m
  timeout: 9m
  targetNamespace: kagent
  chartRef:
    kind: OCIRepository
    name: kagent-crds-chart
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    kmcp:
      enabled: false
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kagent
  namespace: flux-system
spec:
  interval: 30m
  timeout: 9m
  dependsOn:
    - name: kagent-crds
  targetNamespace: kagent
  chart:
    spec:
      chart: ./charts/vendor/kagent
      sourceRef:
        kind: GitRepository
        name: platform
        namespace: flux-system
      interval: 1m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    kmcp:
      enabled: false
