apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-a2a-agent
  namespace: kagent
spec:
  description: An example A2A agent that knows how to use Kubernetes tools.
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |-
      You are an expert Kubernetes agent that uses tools to help users.
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          toolNames:
            - k8s_get_resources
            - k8s_get_available_api_resources
    a2aConfig:
      skills:
        - id: get-resources-skill
          name: Get Resources
          description: Get resources in the Kubernetes cluster.
          inputModes: [text]
          outputModes: [text]
          tags: [k8s, resources]
          examples:
            - Get all resources in the Kubernetes cluster.
            - Get the pods in the default namespace.
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: echo-validation-agent
  namespace: kagent
spec:
  description: Validates the kmcp -> agentgateway -> kagent MCP path.
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |-
      You validate the echo MCP path.
      When asked to test connectivity, call the echo tool and return the echoed value verbatim.
    tools:
      - type: McpServer
        mcpServer:
          name: echo-mcp
          kind: RemoteMCPServer
          toolNames:
            - echo
