apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: echo-mcp
  namespace: kagent
spec:
  description: Echo MCP server managed by kmcp and exposed through agentgateway.
  protocol: STREAMABLE_HTTP
  url: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local:8080/mcp/echo"
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: kagent-tool-server
  namespace: kagent
spec:
  description: kagent bundled tool server exposed through agentgateway.
  protocol: STREAMABLE_HTTP
  url: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local:8080/mcp/kagent-tools"
---
apiVersion: kagent.dev/v1alpha2
