# External clients hit kgateway first. Requests are then sent to agentgateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-entry-route
  namespace: ai-gateway
spec:
  parentRefs:
    - name: public-gateway
      namespace: kgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/
      backendRefs:
        - name: agentgateway
          namespace: agentgateway-system
          port: 8080
