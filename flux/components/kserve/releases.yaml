apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kserve-crd
  namespace: flux-system
spec:
  interval: 30m
  timeout: 9m
  targetNamespace: kserve
  chartRef:
    kind: OCIRepository
    name: kserve-crd-chart
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kserve
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  dependsOn:
    - name: kserve-crd
    - name: cert-manager
  targetNamespace: kserve
  chartRef:
    kind: OCIRepository
    name: kserve-chart
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  postRenderers:
    - kustomize:
        patches:
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-lgbserver
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-lgbserver
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-mlserver
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-mlserver
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-paddleserver
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-paddleserver
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-pmmlserver
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-pmmlserver
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-sklearnserver
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-sklearnserver
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-tensorflow-serving
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-tensorflow-serving
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-torchserve
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-torchserve
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-tritonserver
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-tritonserver
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-xgbserver
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-xgbserver
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-huggingfaceserver
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-huggingfaceserver
          - patch: |
              apiVersion: serving.kserve.io/v1alpha1
              kind: ClusterServingRuntime
              metadata:
                name: kserve-huggingfaceserver-multinode
              $patch: delete
            target:
              group: serving.kserve.io
              version: v1alpha1
              kind: ClusterServingRuntime
              name: kserve-huggingfaceserver-multinode
  values:
    kserve:
      controller:
        deploymentMode: Standard
      gateway:
        ingressGateway:
          createGateway: false
      servingruntime:
        tensorflow:
          disabled: true
        mlserver:
          disabled: true
        sklearnserver:
          disabled: true
        xgbserver:
          disabled: true
        huggingfaceserver:
          disabled: true
        huggingfaceserver_multinode:
          disabled: true
        tritonserver:
          disabled: true
        pmmlserver:
          disabled: true
        paddleserver:
          disabled: true
        lgbserver:
          disabled: true
        torchserve:
          disabled: true
