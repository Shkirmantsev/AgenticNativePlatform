apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: context
  chartRef:
    kind: OCIRepository
    name: bitnami-redis-chart
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      tag: "8.6.1"
    architecture: standalone
    master:
      persistence:
        size: 10Gi
