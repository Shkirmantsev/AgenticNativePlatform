apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: context
  chartRef:
    kind: OCIRepository
    name: bitnami-redis-chart
    namespace: flux-system
  values:
    architecture: standalone
    master:
      persistence:
        size: 10Gi
