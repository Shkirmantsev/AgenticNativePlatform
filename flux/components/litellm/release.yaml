apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: litellm-proxy
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: ai-gateway
  chart:
    spec:
      chart: ./charts/litellm-proxy
      sourceRef:
        kind: GitRepository
        name: platform
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: true
  valuesFrom:
    - kind: ConfigMap
      name: litellm-values
      valuesKey: values.yaml
