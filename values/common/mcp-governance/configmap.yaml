apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-governance-values
  namespace: flux-system
  labels:
    reconcile.fluxcd.io/watch: Enabled
data:
  values.yaml: |
    createNamespace: false

    controller:
      replicas: 1
      image:
        repository: ghcr.io/techwithhuz/mcp-governance-controller
        tag: 0.21.0
        pullPolicy: IfNotPresent
      port: 8090
      service:
        type: ClusterIP
      googleApiKeySecret: mcp-governance-ai-secrets
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 256Mi
      serviceAccount:
        create: true
        name: mcp-governance-controller

    dashboard:
      enabled: true
      replicas: 1
      image:
        repository: ghcr.io/techwithhuz/mcp-governance-dashboard
        tag: 0.21.0
        pullPolicy: IfNotPresent
      port: 3000
      service:
        type: ClusterIP
      resources:
        requests:
          cpu: 100m
          memory: 128Mi
        limits:
          cpu: 300m
          memory: 256Mi

    crds:
      installExternal: false

    samples:
      install: false
