apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm-values
  namespace: flux-system
data:
  values.yaml: |
    replicaCount: 1
    extraEnv:
      - name: REDIS_HOST
        valueFrom:
          secretKeyRef:
            name: litellm-provider-secrets
            key: REDIS_HOST
      - name: REDIS_PORT
        valueFrom:
          secretKeyRef:
            name: litellm-provider-secrets
            key: REDIS_PORT
      - name: REDIS_PASSWORD
        valueFrom:
          secretKeyRef:
            name: litellm-provider-secrets
            key: REDIS_PASSWORD
    config: |
      general_settings:
        master_key: os.environ/LITELLM_MASTER_KEY
        store_model_in_db: false
        infer_model_from_keys: true
      litellm_settings:
        set_verbose: false
        use_chat_completions_url_for_anthropic_messages: true
        callbacks:
          - prometheus

      # Redis-backed router state keeps provider budgets / rpm / tpm consistent
      # across LiteLLM replicas and restarts. Redis already exists in this repo
      # under apps/context/redis.

      # Router-level reliability. This is where multi-provider failover lives.
      # NOTE: For streaming fallbacks, validate against the LiteLLM version you ship.
      # Some versions have known edge cases for 429 streaming fallback.
      router_settings:
        redis_host: os.environ/REDIS_HOST
        redis_port: os.environ/REDIS_PORT
        redis_password: os.environ/REDIS_PASSWORD
        num_retries: 2
        max_fallbacks: 3
        request_timeout: 30
        enable_pre_call_checks: true
        fallbacks:
          - default-gemini:
              - openai-default
              - anthropic-default
              - local-vllm
      model_list:
        - model_name: default-gemini
          rpm: 500
          tpm: 50000
          litellm_params:
            model: gemini/gemini-3.1-flash-lite-preview
            api_key: os.environ/GOOGLE_API_KEY
            max_budget: 25
            budget_duration: 1d
        - model_name: openai-default
          rpm: 500
          tpm: 50000
          litellm_params:
            model: openai/gpt-4o-mini
            api_key: os.environ/OPENAI_API_KEY
            max_budget: 25
            budget_duration: 1d
        - model_name: anthropic-default
          rpm: 500
          tpm: 50000
          litellm_params:
            model: anthropic/claude-3-5-haiku-20241022
            api_key: os.environ/ANTHROPIC_API_KEY
            max_budget: 25
            budget_duration: 1d
        - model_name: vertex-gemini
          rpm: 500
          tpm: 50000
          litellm_params:
            model: vertex_ai/gemini-2.5-flash
            vertex_project: os.environ/VERTEX_PROJECT_ID
            vertex_location: os.environ/VERTEX_LOCATION
            max_budget: 25
            budget_duration: 1d
        - model_name: bedrock-claude
          rpm: 500
          tpm: 50000
          litellm_params:
            model: bedrock/anthropic.claude-3-5-haiku-20241022-v1:0
            aws_region_name: os.environ/AWS_REGION
            max_budget: 25
            budget_duration: 1d
        - model_name: local-lmstudio
          rpm: 500
          tpm: 50000
          litellm_params:
            model: openai/qwen/qwen3-4b
            api_base: http://lmstudio-external.ai-gateway.svc.cluster.local:1234/v1
            api_key: dummy
        - model_name: local-lmstudio-embeddings
          rpm: 500
          tpm: 50000
          litellm_params:
            model: openai/text-embedding-qwen3-embedding-0.6b
            api_base: http://lmstudio-external.ai-gateway.svc.cluster.local:1234/v1
            api_key: dummy
        - model_name: local-ollama
          rpm: 500
          tpm: 50000
          litellm_params:
            model: ollama/qwen2.5:7b-instruct
            api_base: http://ollama.ai-models.svc.cluster.local:11434
        - model_name: local-vllm
          rpm: 500
          tpm: 50000
          litellm_params:
            model: openai/local-vllm
            api_base: http://vllm-openai.ai-models.svc.cluster.local:8000/v1
            api_key: dummy
