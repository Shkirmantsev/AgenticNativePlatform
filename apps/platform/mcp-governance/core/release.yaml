apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: mcp-governance
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  dependsOn:
    - name: agentgateway
    - name: kagent
    - name: agentregistry-inventory
  targetNamespace: mcp-governance-system
  chartRef:
    kind: OCIRepository
    name: mcp-governance-chart
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  valuesFrom:
    - kind: ConfigMap
      name: mcp-governance-values
      valuesKey: values.yaml
