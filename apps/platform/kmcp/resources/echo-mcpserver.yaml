apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: echo-mcp
  namespace: kagent
  labels:
    kagent.dev/discovery: "disabled"
spec:
  transportType: http
  httpTransport:
    targetPort: 3001
    path: /mcp
  deployment:
    image: node:22-bookworm-slim
    imagePullPolicy: IfNotPresent
    cmd: sh
    args:
      - -c
      - |
        npm install -g @modelcontextprotocol/server-everything@2026.1.26
        npm cache clean --force
        npm run -g start:streamableHttp --prefix "$(npm root -g)/@modelcontextprotocol/server-everything"
    port: 3001
    replicas: 1
    env:
      PORT: "3001"
    labels:
      app.kubernetes.io/name: echo-mcp
      app.kubernetes.io/component: mcp
      app.kubernetes.io/part-of: agentic-native-platform
    resources:
      requests:
        cpu: "50m"
        memory: "64Mi"
        ephemeral-storage: "128Mi"
      limits:
        cpu: "250m"
        memory: "128Mi"
        ephemeral-storage: "512Mi"
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: echo-mcp-http
  namespace: kagent
  annotations:
    agentgateway.dev/mcp-path: /mcp
  labels:
    app.kubernetes.io/name: echo-mcp
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: agentic-native-platform
spec:
  selector:
    app.kubernetes.io/name: echo-mcp
  ports:
    - name: mcp
      port: 3001
      targetPort: 3001
      appProtocol: agentgateway.dev/mcp
