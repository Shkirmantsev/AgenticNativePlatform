apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: echo-mcp
  namespace: kagent
  labels:
    kagent.dev/discovery: "disabled"
spec:
  transportType: http
  httpTransport:
    path: /mcp
    targetPort: 3001
  timeout: 60s
  deployment:
    cmd: npx
    args:
      - -y
      - "@modelcontextprotocol/server-everything@2026.1.26"
      - streamableHttp
    port: 3001
    replicas: 1
    env:
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector-traces.observability.svc.cluster.local:4317
      OTEL_EXPORTER_OTLP_INSECURE: "true"
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: none
      OTEL_LOGS_EXPORTER: none
      OTEL_SERVICE_NAME: echo-mcp
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=kagent,deployment.environment=platform
    labels:
      app.kubernetes.io/name: echo-mcp
      app.kubernetes.io/component: mcp
      app.kubernetes.io/part-of: agentic-native-platform
      istio.io/dataplane-mode: none
    resources:
      requests:
        cpu: "50m"
        memory: "256Mi"
        ephemeral-storage: "115Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"
        ephemeral-storage: "460Mi"
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
      runAsNonRoot: true
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
    podSecurityContext:
      seccompProfile:
        type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: echo-mcp-http
  namespace: kagent
  annotations:
    agentgateway.dev/mcp-path: /mcp
  labels:
    app.kubernetes.io/name: echo-mcp
    app.kubernetes.io/component: mcp
    app.kubernetes.io/part-of: agentic-native-platform
spec:
  selector:
    app.kubernetes.io/name: echo-mcp
  ports:
    - name: mcp
      port: 3001
      targetPort: 3001
      appProtocol: agentgateway.dev/mcp
