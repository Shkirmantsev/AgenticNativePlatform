apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentregistry-inventory
  namespace: flux-system
spec:
  interval: 30m
  timeout: 10m
  dependsOn:
    - name: kmcp
    - name: kagent
  targetNamespace: agentregistry
  chart:
    spec:
      chart: ./charts/agentregistry
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: agentregistry-inventory
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
