apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: k8s-a2a-agent
  namespace: kagent
spec:
  description: An example A2A agent that knows how to use Kubernetes tools.
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |-
      You are an expert Kubernetes agent that uses tools to help users.
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - k8s_get_resources
            - k8s_get_available_api_resources
          requireApproval:
            - k8s_get_resources
            - k8s_get_available_api_resources
    a2aConfig:
      skills:
        - id: get-resources-skill
          name: Get Resources
          description: Get resources in the Kubernetes cluster.
          inputModes: [text]
          outputModes: [text]
          tags: [k8s, resources]
          examples:
            - Get all resources in the Kubernetes cluster.
            - Get the pods in the default namespace.
---
apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: finnhub-agent
  namespace: kagent
spec:
  description: A dedicated Finnhub market-data agent for natural-language finance questions, tool planning, and retrieval of free Finnhub-backed market data.
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |-
      You are finnhub-agent, a focused Finnhub market-data specialist.

      Your job is to turn natural-language finance requests into reliable Finnhub tool usage. You can answer requests about quotes, market status, company profiles, company news, earnings, filings, analyst trends, insider activity, forex, crypto, exchange symbol lookup, and other free Finnhub-backed market data.

      Workflow rules:
      1. If the request is ambiguous, multi-step, or missing identifiers, start with catalog_match_tools.
      2. If the request is already concrete and includes the required identifiers, bypass catalog_match_tools and call the relevant Finnhub endpoint tools directly.
      3. If you need to inspect one tool before calling it, use catalog_get_tool_details.
      4. If the user gives a company name but not a ticker, usually start with finnhub_symbol_search before quote, profile, earnings, or news tools.
      5. Call endpoint tools directly only when the required arguments are known or can be elicited.
      6. For multi-step requests, explain the plan briefly: which Finnhub tools you will use, in which order, and what key parameters you selected.
      7. For deterministic smoke tests or delegated requests that already include an explicit symbol, avoid unnecessary clarification planning, sampling-oriented discovery, and elicitation.

      Response rules:
      - Use only the Finnhub MCP tools available to you.
      - Do not invent market data, symbols, dates, or company facts.
      - If Finnhub does not provide the requested capability, say so clearly.
      - If the request needs broader reasoning, trading advice, or non-Finnhub actions, state the limitation and complete only the Finnhub-specific portion.
      - Prefer precise, tool-grounded answers over vague summaries.

      Example behaviors:
      - "What is Apple's latest quote?" -> resolve the ticker if needed, then use finnhub_quote.
      - "Compare Nvidia earnings and recent news" -> plan with catalog_match_tools, then likely use earnings and company news tools with symbol NVDA.
      - "I need data for Bitcoin pairs on Binance" -> use the crypto catalog or symbol tools before any symbol-specific lookup.
    tools:
      - type: McpServer
        mcpServer:
          name: finnhub-mcp-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - catalog_get_tool_details
            - catalog_list_tools
            - catalog_match_tools
            - finnhub_company_basic_financials
            - finnhub_company_earnings
            - finnhub_company_news
            - finnhub_company_peers
            - finnhub_company_profile2
            - finnhub_country
            - finnhub_covid_19
            - finnhub_crypto_exchanges
            - finnhub_crypto_symbols
            - finnhub_earnings_calendar
            - finnhub_fda_committee_meeting_calendar
            - finnhub_filings
            - finnhub_financials_reported
            - finnhub_forex_exchanges
            - finnhub_forex_symbols
            - finnhub_insider_sentiment
            - finnhub_insider_transactions
            - finnhub_ipo_calendar
            - finnhub_market_holiday
            - finnhub_market_news
            - finnhub_market_status
            - finnhub_quote
            - finnhub_recommendation_trends
            - finnhub_stock_lobbying
            - finnhub_stock_symbols
            - finnhub_stock_usa_spending
            - finnhub_stock_uspto_patent
            - finnhub_stock_visa_application
            - finnhub_symbol_search
#          requireApproval:
#            - catalog_get_tool_details
#            - catalog_list_tools
#            - catalog_match_tools
#            - finnhub_company_basic_financials
#            - finnhub_company_earnings
#            - finnhub_company_news
#            - finnhub_company_peers
#            - finnhub_company_profile2
#            - finnhub_country
#            - finnhub_covid_19
#            - finnhub_crypto_exchanges
#            - finnhub_crypto_symbols
#            - finnhub_earnings_calendar
#            - finnhub_fda_committee_meeting_calendar
#            - finnhub_filings
#            - finnhub_financials_reported
#            - finnhub_forex_exchanges
#            - finnhub_forex_symbols
#            - finnhub_insider_sentiment
#            - finnhub_insider_transactions
#            - finnhub_ipo_calendar
#            - finnhub_market_holiday
#            - finnhub_market_news
#            - finnhub_market_status
#            - finnhub_quote
#            - finnhub_recommendation_trends
#            - finnhub_stock_lobbying
#            - finnhub_stock_symbols
#            - finnhub_stock_usa_spending
#            - finnhub_stock_uspto_patent
#            - finnhub_stock_visa_application
#            - finnhub_symbol_search
    a2aConfig:
      skills:
        - id: finnhub-market-data
          name: Finnhub Market Data
          description: Plans and fetches Finnhub-backed market data for natural-language requests, including tool discovery, symbol lookup, quotes, company data, market news, earnings, filings, forex, and crypto.
          inputModes: [text]
          outputModes: [text]
          tags: [finance, stocks, markets, finnhub, market-data]
          examples:
            - Get the latest quote and company profile for AAPL.
            - I only know the company name Tesla; find the right ticker and then show recent company news.
            - Compare Nvidia earnings with recent company news and tell me which Finnhub tools you used.
            - Find upcoming earnings dates for NVDA.
            - Look up market news and analyst trends for TSLA.
            - Show available crypto symbols for Binance and then fetch the one that matches BTC.
