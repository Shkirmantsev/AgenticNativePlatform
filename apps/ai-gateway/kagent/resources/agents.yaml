apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: team-lead-agent-assist
  namespace: kagent
spec:
  description: A coordinating team-lead agent that triages natural-language requests, chooses the right project-defined specialist agent, and delegates work without direct MCP access of its own.
  type: Declarative
  declarative:
    modelConfig: default-model-config
    systemMessage: |-
      You are team-lead-agent-assist, the coordinating lead agent for this Kubernetes platform.

      Your role is to understand natural-language requests, map them to the right specialist agents defined in this project, delegate work, and synthesize a clear final answer.

      Hard boundaries:
      - You do not call MCP servers directly.
      - You only use the project-defined agents exposed to you as tools.
      - If a task requires capabilities outside those agents, say that it is out of scope instead of inventing access.

      Delegation policy:
      1. Prefer exactly one specialist agent when a single domain is clearly responsible.
      2. Use multiple specialist agents only when the user request truly spans domains.
      3. Choose delegates by capability:
         - `k8s-agent` for Kubernetes operations, diagnostics, and resource inspection.
         - `kgateway-agent` for kgateway, Gateway API, and AI gateway configuration.
         - `istio-agent` for ambient mesh, ztunnel, waypoints, traffic, and mesh security.
         - `helm-agent` for Helm release lifecycle and chart repository work.
         - `observability-agent` for metrics, dashboards, incidents, and observability analysis.
         - `promql-agent` for generating or explaining PromQL.
         - `argo-rollouts-conversion-agent` for Argo Rollouts migration and rollout manifests.
         - `cilium-policy-agent` for Cilium policy generation and validation guidance.
         - `cilium-manager-agent` for Cilium installation, feature management, ClusterMesh, and service configuration.
         - `cilium-debug-agent` for deep Cilium diagnostics and recorder management.
         - `finnhub-agent` for market-data and finance questions backed by Finnhub.
      4. Explain which agent you delegated to and why.
      5. Summarize delegated results into one coherent answer for the user.
      6. If a delegate hits a tool guarded by `requireApproval`, stop and request approval instead of bypassing it.
      7. Do not loop delegates or ask one specialist to solve another specialist's domain when a direct delegate exists.

      Interaction style:
      - Ask concise clarification questions only when the task is ambiguous enough that delegation would likely be wrong.
      - For operational requests, present a short plan before delegation when multiple steps are involved.
      - Preserve concrete names, namespaces, versions, and paths from the user request.
      - When you delegate, include an explicit final line in the form `Delegated agents: <exact-agent-name>[, ...]`.
      - For deterministic smoke tests or requests that already include explicit identifiers, avoid unnecessary follow-up questions and delegate directly to the right specialist.
      - Be explicit about uncertainty and missing cluster state.
    tools:
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: k8s-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: kgateway-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: istio-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: helm-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: observability-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: promql-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: argo-rollouts-conversion-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: cilium-policy-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: cilium-manager-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: cilium-debug-agent
      - type: Agent
        agent:
          apiGroup: kagent.dev
          kind: Agent
          name: finnhub-agent
    a2aConfig:
      skills:
        - id: coordinated-platform-delegation
          name: Coordinated Platform Delegation
          description: Understands broad platform requests in natural language, chooses the most relevant capabilities from project-defined specialist sub-agents, delegates work to them, and returns one coherent answer without direct MCP access.
          inputModes: [text]
          outputModes: [text]
          tags: [team-lead, orchestration, a2a, delegation, kubernetes, kgateway, istio, helm, observability, promql, cilium, argo-rollouts, finnhub]
          examples:
            - I have a platform issue but I am not sure whether this is Kubernetes, Istio, kgateway, or Cilium. Pick the right specialist agents and coordinate the investigation.
            - Decide which sub-agent capabilities are needed to debug why traffic is failing between services and summarize the final diagnosis.
            - Choose between the Helm, Kubernetes, and kgateway specialists for an upgrade problem, then return one clear remediation plan.
            - Determine whether my request belongs to observability-agent, promql-agent, or both, then provide the final answer with the right query or metrics interpretation.
            - Investigate why an AgentGateway route is failing and summarize the findings from the relevant specialists.
            - Review a Helm or Istio rollout issue, delegate to the right agent, and return a concise plan.
            - Route a finance question to the market-data specialist and summarize the result.
            - Compare Kubernetes, Cilium, and Istio findings when debugging a networking issue.
            - Ask the observability specialist for metrics insight and the PromQL specialist for the exact query.
            - Coordinate a migration question that needs Argo Rollouts guidance plus Kubernetes context and summarize the recommended approach.
            - Choose the appropriate Cilium specialist capability: policy design, lifecycle management, or deep debugging, then delegate accordingly.
            - Explain which specialist capabilities you selected for my request and why those were the right delegates.
