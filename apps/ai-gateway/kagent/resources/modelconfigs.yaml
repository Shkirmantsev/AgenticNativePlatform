# Per-agent ModelConfig variants.
#
# Why: kagent Agents reference a ModelConfig by name. By creating dedicated
# ModelConfigs for each real agent in this repo (team-lead-agent-assist,
# finnhub-agent, k8s-a2a-agent), we can:
#  - tag traffic for downstream FinOps (LiteLLM request tags)
#  - later split budgets / routing per agent without changing Agent code
#
# Tag transport: LiteLLM supports request tags via the `x-litellm-tags` header.
# (See docs: https://docs.litellm.ai/docs/proxy/request_headers)

apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: k8s-a2a-model-config
  namespace: kagent
spec:
  provider: "OpenAI"
  model: "default-gemini"
  apiKeySecret: kagent-agentgateway
  apiKeySecretKey: OPENAI_API_KEY
  defaultHeaders:
    x-litellm-tags: "agent:k8s-a2a-agent,workload:a2a,team:platform"
    x-litellm-spend-logs-metadata: '{"agent":"k8s-a2a-agent","team":"platform","workload":"a2a"}'
  openAI:
    baseUrl: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local:8080/v1"

