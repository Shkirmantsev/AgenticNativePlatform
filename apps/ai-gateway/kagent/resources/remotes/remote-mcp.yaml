apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: kagent-tool-server
  namespace: kagent
spec:
  description: kagent bundled tool server exposed through AgentGateway at /mcp/kagent-tools.
  protocol: STREAMABLE_HTTP
  timeout: 30s
  sseReadTimeout: 5m0s
  terminateOnClose: true
  url: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local:8080/mcp/kagent-tools"
