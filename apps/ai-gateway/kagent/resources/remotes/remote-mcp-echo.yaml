apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: echo-mcp-server
  namespace: kagent
spec:
  description: Echo MCP server exposed through AgentGateway at /mcp/echo-mcp.
  protocol: STREAMABLE_HTTP
  timeout: 30s
  sseReadTimeout: 5m0s
  terminateOnClose: true
  url: "http://agentgateway-proxy.agentgateway-system.svc.cluster.local:8080/mcp/echo-mcp"
