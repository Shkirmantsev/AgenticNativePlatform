apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway-crds
  namespace: flux-system
spec:
  interval: 30m
  timeout: 6m
  targetNamespace: agentgateway-system
  chartRef:
    kind: OCIRepository
    name: agentgateway-crds-chart
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: flux-system
spec:
  interval: 30m
  timeout: 6m
  dependsOn:
    - name: agentgateway-crds
  targetNamespace: agentgateway-system
  chartRef:
    kind: OCIRepository
    name: agentgateway-chart
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    service:
      type: ClusterIP
