apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: litellm-upstream-policy
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: litellm-upstream
  backend:
    http:
      requestTimeout: 300s
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agentgateway-openai-rate-limit
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: agentgateway-openai-route
  traffic:
    rateLimit:
      local:
        - requests: 500
          unit: Minutes
        - tokens: 50000
          unit: Minutes
