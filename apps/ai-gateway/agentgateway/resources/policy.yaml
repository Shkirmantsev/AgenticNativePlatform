apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: litellm-upstream-policy
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: litellm-upstream
  backend:
    tcp:
      connectTimeout: 2s
    http:
      requestTimeout: 300s
    health:
      unhealthyCondition: "response.code >= 500"
      eviction:
        consecutiveFailures: 5
        healthThreshold: 50
        duration: 30s
        restoreHealth: 100
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agentgateway-openai-rate-limit
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: agentgateway-openai-route
  traffic:
    rateLimit:
      local:
        - requests: 500
          unit: Minutes
        - tokens: 50000
          unit: Minutes

---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agentgateway-kagent-a2a-rate-limit
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: kagent-a2a-route
  traffic:
    rateLimit:
      local:
        # Protect the controller from runaway / stuck workflows (e.g. tool-call loops).
        # This is intentionally generous for demos; tighten per environment.
        - requests: 300
          unit: Minutes
        - tokens: 30000
          unit: Minutes
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: agentgateway-tracing
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  frontend:
    tracing:
      backendRef:
        name: otel-collector-traces
        namespace: observability
        port: 4317
      protocol: GRPC
      clientSampling: "true"
      randomSampling: "true"
      resources:
        - name: deployment.environment.name
          expression: '"platform"'
        - name: service.version
          expression: '"gitops"'
