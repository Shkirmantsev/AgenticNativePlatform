apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: kagent-tools-mcp-backend
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: kagent-tools
        static:
          host: kagent-kagent-tools.kagent.svc.cluster.local
          port: 8084
          path: /mcp
          protocol: StreamableHTTP
