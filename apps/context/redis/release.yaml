apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: context
  chartRef:
    kind: OCIRepository
    name: bitnami-redis-chart
    namespace: flux-system
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      digest: "sha256:7e8f031b2b95551e983f7ab4396d677fe6a8b8c25e89080a5a00b7b8de8cfbd7"
    architecture: standalone
    master:
      persistence:
        size: 1000Mi
