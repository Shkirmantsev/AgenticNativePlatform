apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vllm-cpu
  namespace: flux-system
spec:
  interval: 30m
  targetNamespace: ai-models
  chart:
    spec:
      chart: ./charts/vllm-cpu
      reconcileStrategy: Revision
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 1m
  install:
    createNamespace: true
  valuesFrom:
    - kind: ConfigMap
      name: vllm-values
      valuesKey: values.yaml
