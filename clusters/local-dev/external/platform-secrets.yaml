apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-secrets
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 10m
  dependsOn:
    - name: platform-infrastructure
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/local-dev/secrets
