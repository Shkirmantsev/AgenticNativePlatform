apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-secrets
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 10m
  # Secrets must not wait for platform-infrastructure readiness.
  # Several infrastructure HelmReleases need these Secrets during install.
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/local-dev/secrets
