apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-applications-core
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 12m
  dependsOn:
    - name: platform-applications-remotes
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./apps/platform/application-resources
