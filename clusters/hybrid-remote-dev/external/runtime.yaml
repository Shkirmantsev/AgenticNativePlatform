apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-runtime
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 12m
  dependsOn:
    - name: platform-infrastructure
    - name: platform-secrets
  healthChecks:
    - apiVersion: apps/v1
      kind: Deployment
      name: agentgateway-proxy
      namespace: agentgateway-system
    - apiVersion: apps/v1
      kind: Deployment
      name: kagent-kagent-tools
      namespace: kagent
    - apiVersion: apps/v1
      kind: Deployment
      name: echo-mcp
      namespace: kagent
    - apiVersion: apps/v1
      kind: Deployment
      name: finnhub-mcp-backend
      namespace: kagent
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/hybrid-remote-dev/runtime
