apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-applications
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 12m
  # Applications need both the infrastructure controllers/CRDs and the
  # secret stage. Keep the dependency explicit now that secrets can reconcile
  # in parallel with infrastructure.
  dependsOn:
    - name: platform-infrastructure
    - name: platform-secrets
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/hybrid-remote-dev/apps
