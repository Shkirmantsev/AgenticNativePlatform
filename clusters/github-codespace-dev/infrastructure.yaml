apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-infrastructure
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 12m
  healthChecks:
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kgateway-crds
      namespace: flux-system
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kgateway
      namespace: flux-system
    - apiVersion: apiextensions.k8s.io/v1
      kind: CustomResourceDefinition
      name: backendconfigpolicies.gateway.kgateway.dev
  sourceRef:
    kind: GitRepository
    name: flux-system
  path: ./clusters/github-codespace-dev/infrastructure
