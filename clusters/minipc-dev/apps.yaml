apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: platform-applications
  namespace: flux-system
spec:
  interval: 10m
  prune: true
  wait: true
  timeout: 20m
  dependsOn:
    - name: platform-secrets
  sourceRef:
    kind: GitRepository
    name: platform
  path: ./clusters/minipc-dev/apps
