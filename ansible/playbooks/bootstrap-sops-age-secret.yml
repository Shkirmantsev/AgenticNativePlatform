---
- name: Bootstrap the Flux SOPS age secret from the local workstation
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    repo_root: "{{ playbook_dir }}/../.."
    key_file: "{{ repo_root }}/.sops/age.agekey"
    generated_dir: "{{ repo_root }}/.generated/bootstrap/flux-system"
    rendered_secret_path: "{{ generated_dir }}/sops-age-secret.yaml"
    kubeconfig_path: "{{ kubeconfig_path | default(repo_root ~ '/.kube/generated/current.yaml') }}"
  tasks:
    - name: Ensure the local SOPS age key exists
      ansible.builtin.stat:
        path: "{{ key_file }}"
      register: age_key

    - name: Fail when the local SOPS age key is missing
      ansible.builtin.fail:
        msg: "Missing {{ key_file }}. Run 'make sops-age-key' first."
      when: not age_key.stat.exists

    - name: Read the local SOPS age key
      ansible.builtin.slurp:
        src: "{{ key_file }}"
      register: age_key_content

    - name: Ensure the generated bootstrap directory exists
      ansible.builtin.file:
        path: "{{ generated_dir }}"
        state: directory
        mode: "0700"

    - name: Render the SOPS age secret manifest locally
      ansible.builtin.copy:
        dest: "{{ rendered_secret_path }}"
        mode: "0600"
        content: |
          apiVersion: v1
          kind: Secret
          metadata:
            name: sops-age
            namespace: flux-system
          type: Opaque
          stringData:
            age.agekey: |
          {% for line in (age_key_content.content | b64decode).splitlines() %}
              {{ line }}
          {% endfor %}

    - name: Apply the rendered SOPS age secret manifest
      ansible.builtin.command:
        argv:
          - kubectl
          - --kubeconfig
          - "{{ kubeconfig_path }}"
          - apply
          - -f
          - "{{ rendered_secret_path }}"
      register: apply_result
      changed_when: "'created' in apply_result.stdout or 'configured' in apply_result.stdout"
