---
- name: Install k3s server
  hosts: k3s_server
  become: true
  vars_files:
    - ../vars/local-oci-cache.yml
  vars:
    k3s_version: "{{ lookup('env', 'K3S_VERSION') | default('v1.34.5+k3s1', true) }}"
    repo_kubeconfig_raw_dir: "{{ playbook_dir }}/../../.kube/generated/raw"
    topology: "{{ lookup('env', 'TOPOLOGY') | default('local', true) }}"
    local_oci_cache_enabled: "{{ topology == 'local' and (lookup('env', 'LOCAL_OCI_CACHE_ENABLED') | default('true', true) | bool) }}"
  tasks:
    - name: Create k3s config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Render k3s server config
      template:
        src: ../templates/k3s-server-config.yaml.j2
        dest: /etc/rancher/k3s/config.yaml
        mode: '0644'

    - name: Render k3s registry mirrors
      template:
        src: ../templates/k3s-registries.yaml.j2
        dest: /etc/rancher/k3s/registries.yaml
        mode: '0644'
      # The local cache is a host service, so only the local single-node
      # topology should point containerd at localhost mirror endpoints.
      when: local_oci_cache_enabled

    - name: Remove k3s registry mirrors when the local cache is disabled
      file:
        path: /etc/rancher/k3s/registries.yaml
        state: absent
      when: not local_oci_cache_enabled

    - name: Install k3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -
      args:
        executable: /bin/bash

    - name: Wait for token
      wait_for:
        path: /var/lib/rancher/k3s/server/token
        timeout: 120

    - name: Read k3s token
      slurp:
        src: /var/lib/rancher/k3s/server/token
      register: k3s_token

    - name: Save token for later plays
      set_fact:
        cluster_token: "{{ k3s_token.content | b64decode | trim }}"

    - name: Fetch kubeconfig
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: "{{ repo_kubeconfig_raw_dir }}/"
        flat: false
