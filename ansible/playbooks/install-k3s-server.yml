---
- name: Install k3s server
  hosts: k3s_server
  become: true
  vars:
    k3s_version: "{{ lookup('env', 'K3S_VERSION') | default('v1.34.5+k3s1', true) }}"
  tasks:
    - name: Create k3s config directory
      file:
        path: /etc/rancher/k3s
        state: directory
        mode: '0755'

    - name: Render k3s server config
      template:
        src: ../templates/k3s-server-config.yaml.j2
        dest: /etc/rancher/k3s/config.yaml
        mode: '0644'

    - name: Install k3s server
      shell: |
        curl -sfL https://get.k3s.io | INSTALL_K3S_VERSION={{ k3s_version }} sh -
      args:
        executable: /bin/bash

    - name: Wait for token
      wait_for:
        path: /var/lib/rancher/k3s/server/token
        timeout: 120

    - name: Read k3s token
      slurp:
        src: /var/lib/rancher/k3s/server/token
      register: k3s_token

    - name: Save token for later plays
      set_fact:
        cluster_token: "{{ k3s_token.content | b64decode | trim }}"

    - name: Fetch kubeconfig
      fetch:
        src: /etc/rancher/k3s/k3s.yaml
        dest: .kube/generated/
        flat: false
