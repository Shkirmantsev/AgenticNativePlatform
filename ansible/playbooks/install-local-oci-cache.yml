---
- name: Install or refresh the local OCI cache
  hosts: all
  become: true
  vars_files:
    - ../vars/local-oci-cache.yml
  vars:
    local_oci_cache_root: "{{ lookup('env', 'LOCAL_OCI_CACHE_ROOT') | default('/var/lib/agentic-native-platform/oci-cache', true) }}"
    local_oci_cache_config_dir: /etc/agentic-native-platform/oci-cache
  tasks:
    - name: Configure the local OCI pull-through cache
      import_tasks: ../tasks/setup-local-oci-cache.yml
