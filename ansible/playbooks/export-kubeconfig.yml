---
- name: Export kubeconfig to local machine
  hosts: k3s_server
  become: true
  vars:
    repo_kubeconfig_dir: "{{ playbook_dir }}/../../.kube/generated"
  tasks:
    - name: Ensure local kubeconfig directory exists
      delegate_to: localhost
      become: false
      file:
        path: "{{ repo_kubeconfig_dir }}"
        state: directory
        mode: "0755"

    - name: Read kubeconfig
      slurp:
        src: /etc/rancher/k3s/k3s.yaml
      register: kubeconf

    - name: Write topology-specific kubeconfig locally with server host rewritten
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ repo_kubeconfig_dir }}/{{ inventory_hostname }}.yaml"
        mode: "0600"
        content: "{{ (kubeconf.content | b64decode).replace('127.0.0.1', hostvars[inventory_hostname].ansible_host) }}"

    - name: Write stable current kubeconfig locally
      delegate_to: localhost
      become: false
      copy:
        dest: "{{ repo_kubeconfig_dir }}/current.yaml"
        mode: "0600"
        content: "{{ (kubeconf.content | b64decode).replace('127.0.0.1', hostvars[inventory_hostname].ansible_host) }}"
