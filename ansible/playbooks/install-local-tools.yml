---
- name: Install local operator tools on Ubuntu workstation
  hosts: localhost
  connection: local
  become: true
  tasks:
    - name: Ensure apt prerequisites are present
      ansible.builtin.apt:
        update_cache: true
        name:
          - age
          - sops
          - jq
          - curl
          - git
          - ca-certificates
          - gnupg
          - apt-transport-https
        state: present

    - name: Ensure APT keyrings directory exists
      ansible.builtin.file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Install kubectl from the Kubernetes APT repository
      ansible.builtin.shell: |
        set -euo pipefail
        if ! command -v kubectl >/dev/null 2>&1; then
          curl -fsSL https://pkgs.k8s.io/core:/stable:/v1.34/deb/Release.key | gpg --dearmor -o /etc/apt/keyrings/kubernetes-apt-keyring.gpg
          echo 'deb [signed-by=/etc/apt/keyrings/kubernetes-apt-keyring.gpg] https://pkgs.k8s.io/core:/stable:/v1.34/deb/ /' > /etc/apt/sources.list.d/kubernetes.list
          apt-get update
          apt-get install -y kubectl
        fi
      args:
        executable: /bin/bash

    - name: Install Helm CLI
      ansible.builtin.shell: |
        set -euo pipefail
        if ! command -v helm >/dev/null 2>&1; then
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        fi
      args:
        executable: /bin/bash

    - name: Install Flux CLI
      ansible.builtin.shell: |
        set -euo pipefail
        if ! command -v flux >/dev/null 2>&1; then
          curl -s https://fluxcd.io/install.sh | bash
        fi
      args:
        executable: /bin/bash

    - name: Verify age is installed
      ansible.builtin.command: age-keygen -version
      changed_when: false

    - name: Verify sops is installed
      ansible.builtin.command: sops --version
      changed_when: false

    - name: Verify kubectl is installed
      ansible.builtin.command: kubectl version --client
      changed_when: false

    - name: Verify helm is installed
      ansible.builtin.command: helm version --short
      changed_when: false

    - name: Verify flux is installed
      ansible.builtin.command: flux --version
      changed_when: false
