apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: phoenix
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: observability
  chartRef:
    kind: OCIRepository
    name: phoenix-chart
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: phoenix
    server:
      port: 6006
      grpcPort: 4317
    extraEnv:
      PHOENIX_ENABLE_PROMETHEUS: "true"
      PHOENIX_DEFAULT_RETENTION_POLICY_DAYS: "3"
