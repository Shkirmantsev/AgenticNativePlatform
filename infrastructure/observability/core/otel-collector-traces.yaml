apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: otel-collector-traces
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: observability
  chart:
    spec:
      chart: opentelemetry-collector
      version: 0.127.2
      sourceRef:
        kind: HelmRepository
        name: open-telemetry
        namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    mode: deployment
    replicaCount: 1
    image:
      repository: otel/opentelemetry-collector-contrib
    command:
      name: otelcol-contrib
    serviceMonitor:
      enabled: true
    config:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318
      processors:
        memory_limiter:
          check_interval: 1s
          limit_mib: 256
        batch: {}
      exporters:
        otlp/phoenix:
          endpoint: phoenix.observability.svc.cluster.local:4317
          tls:
            insecure: true
        otlp/tempo:
          endpoint: tempo.observability.svc.cluster.local:4317
          tls:
            insecure: true
        debug:
          verbosity: basic
      service:
        pipelines:
          traces:
            receivers:
              - otlp
            processors:
              - memory_limiter
              - batch
            exporters:
              - debug
              - otlp/phoenix
              - otlp/tempo
