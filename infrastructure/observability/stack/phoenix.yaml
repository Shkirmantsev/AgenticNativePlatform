apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: phoenix
  namespace: flux-system
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: observability
  chartRef:
    kind: OCIRepository
    name: phoenix-chart
    namespace: flux-system
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    fullnameOverride: phoenix
