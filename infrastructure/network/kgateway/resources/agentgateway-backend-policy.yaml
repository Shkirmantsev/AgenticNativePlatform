# Resiliency policies for the AgentGateway data plane as an upstream of kgateway.
# This is *not* model-level failover (that happens downstream in LiteLLM / runtimes),
# but it protects the north-south edge from unhealthy AgentGateway pods.
apiVersion: gateway.kgateway.dev/v1alpha1
kind: BackendConfigPolicy
metadata:
  name: agentgateway-proxy-resiliency
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: agentgateway-proxy

  # Fast fail on broken upstream connections.
  connectTimeout: 2s

  # Passive health checks: eject bad upstream endpoints so traffic shifts to healthy ones.
  outlierDetection:
    interval: 5s
    consecutive5xx: 5
    baseEjectionTime: 30s
    maxEjectionPercent: 50
