# External clients hit kgateway first. Requests are then sent to AgentGateway.
# We intentionally split /v1 and /mcp onto different kgateway Backends so that
# they can have different resiliency/circuit-breaker profiles.

apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ai-entry-route
  namespace: ai-gateway
spec:
  parentRefs:
    - name: public-gateway
      namespace: kgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: agentgateway-llm-edge
          namespace: agentgateway-system
          group: gateway.kgateway.dev
          kind: Backend

    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: agentgateway-mcp-edge
          namespace: agentgateway-system
          group: gateway.kgateway.dev
          kind: Backend