apiVersion: v1
kind: Service
metadata:
  name: lmstudio-external
  namespace: {{ .Values.namespace }}
spec:
  ports:
    - name: http
      port: {{ .Values.port }}
      targetPort: {{ .Values.port }}
---
apiVersion: v1
kind: Endpoints
metadata:
  name: lmstudio-external
  namespace: {{ .Values.namespace }}
subsets:
  - addresses:
      - ip: {{ .Values.hostIP | quote }}
    ports:
      - port: {{ .Values.port }}
