apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: default-model-config
  namespace: {{ .Values.namespace }}
spec:
  apiKeySecret: {{ .Values.existingSecretName }}
  apiKeySecretKey: {{ .Values.apiKeySecretKey }}
  model: {{ .Values.modelName }}
  provider: OpenAI
  openAI:
    baseUrl: {{ .Values.openaiBaseUrl | quote }}
