{{- if and .Values.metrics.enabled .Values.metrics.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "litellm-proxy.fullname" . }}
  namespace: {{ include "litellm-proxy.namespace" . }}
  labels:
{{ include "litellm-proxy.labels" . | indent 4 }}
spec:
  namespaceSelector:
    matchNames:
      - {{ include "litellm-proxy.namespace" . }}
  selector:
    matchLabels:
{{ include "litellm-proxy.selectorLabels" . | indent 6 }}
  endpoints:
    - port: http
      path: /metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      scrapeTimeout: {{ .Values.metrics.serviceMonitor.scrapeTimeout }}
{{- end }}
