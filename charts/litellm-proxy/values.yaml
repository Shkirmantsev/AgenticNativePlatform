namespace: ai-gateway
image:
  repository: ghcr.io/berriai/litellm
  tag: main-stable
  pullPolicy: IfNotPresent
service:
  port: 4000
serviceAccount:
  create: true
  name: litellm
  automountServiceAccountToken: false
# Keep LiteLLM listening on the pod IP, not only loopback, so in-cluster
# callers such as AgentGateway and Istio ambient workloads can reach it.
resources:
  requests:
    cpu: "100m"
    memory: "512Mi"
    ephemeral-storage: "256Mi"
  limits:
    cpu: "500m"
    memory: "1Gi"
    ephemeral-storage: "1Gi"
existingSecretName: litellm-provider-secrets
config: |
  general_settings:
    master_key: os.environ/LITELLM_MASTER_KEY
    store_model_in_db: false
    infer_model_from_keys: true
  litellm_settings:
    set_verbose: false
  model_list:
    - model_name: default-gemini
      litellm_params:
        model: gemini/gemini-3.1-flash-lite-preview
        api_key: os.environ/GOOGLE_API_KEY
