image:
  repository: ollama/ollama
  # Leave empty to default to .Chart.AppVersion.
  tag: ""
  pullPolicy: IfNotPresent
service:
  port: 11434
serviceAccount:
  create: true
  name: ollama
  automountServiceAccountToken: false
modelPull:
  enabled: true
  model: qwen2.5:7b-instruct
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
    ephemeral-storage: "2Gi"
  limits:
    cpu: "2000m"
    memory: "4Gi"
    ephemeral-storage: "10Gi"
persistence:
  enabled: true
  size: 20Gi
