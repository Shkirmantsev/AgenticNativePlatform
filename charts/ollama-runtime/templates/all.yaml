{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
---
{{- end }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-cache
  namespace: {{ .Release.Namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: {app: ollama}
  template:
    metadata:
      labels: {app: ollama}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      containers:
        - name: ollama
          image: {{ .Values.image.repository }}:{{ default .Chart.AppVersion .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 11434
          volumeMounts:
            - name: data
              mountPath: /root/.ollama
          readinessProbe:
            tcpSocket:
              port: 11434
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ollama-cache
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ .Release.Namespace }}
spec:
  selector: {app: ollama}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: 11434
{{- if .Values.modelPull.enabled }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-pull-model
  namespace: {{ .Release.Namespace }}
spec:
  template:
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false
      restartPolicy: OnFailure
      containers:
        - name: pull
          image: curlimages/curl:8.10.1
          command: ["sh","-c"]
          args:
            - |
              until curl -sf http://ollama:11434/api/tags >/dev/null; do sleep 5; done
              curl -s http://ollama:11434/api/pull -d '{"name":"{{ .Values.modelPull.model }}"}'
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
              ephemeral-storage: "128Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
              ephemeral-storage: "512Mi"
{{- end }}
