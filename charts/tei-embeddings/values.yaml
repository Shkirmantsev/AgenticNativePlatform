namespace: ai-models
image:
  repository: ghcr.io/huggingface/text-embeddings-inference
  tag: 1.8
  pullPolicy: IfNotPresent
service:
  port: 80
serviceAccount:
  create: true
  name: tei-embeddings
  automountServiceAccountToken: false
model: Qwen/Qwen3-Embedding-0.6B
resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
    ephemeral-storage: "1Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"
    ephemeral-storage: "4Gi"
