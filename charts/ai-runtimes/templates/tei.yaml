{{- if .Values.tei.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tei-embeddings
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: tei-embeddings }
  template:
    metadata:
      labels: { app: tei-embeddings }
    spec:
      containers:
        - name: tei
          image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
          args: ["--model-id", "{{ .Values.tei.modelId }}", "--port", "80"]
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: tei-embeddings
  namespace: {{ .Values.namespace }}
spec:
  selector: { app: tei-embeddings }
  ports:
    - name: http
      port: 80
      targetPort: 80
{{- end }}
