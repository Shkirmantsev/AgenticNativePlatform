{{- if eq .Values.runtime.type "ollama" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ollama
  namespace: {{ .Release.Namespace }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ollama-models
  namespace: {{ .Release.Namespace }}
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.ollama.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels: { app: ollama }
  template:
    metadata:
      labels: { app: ollama }
    spec:
      serviceAccountName: ollama
      automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
      nodeSelector:
        llm-runtime: "true"
      containers:
        - name: ollama
          image: {{ .Values.ollama.image }}
          ports:
            - containerPort: 11434
          env:
            - name: OLLAMA_KEEP_ALIVE
              value: 30m
          resources:
{{ toYaml .Values.ollama.resources | indent 12 }}
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ .Release.Namespace }}
spec:
  selector: { app: ollama }
  ports:
    - name: http
      port: 11434
      targetPort: 11434
{{- end }}
