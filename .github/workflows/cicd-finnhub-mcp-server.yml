name: cicd-finnhub-mcp-server

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/cicd-finnhub-mcp-server.yml
      - .gitleaks.toml
      - mcp/finnhub-mcp-server/**
      - apps/platform/kmcp/resources/finnhub-mcp-server.yaml
  pull_request:
    branches:
      - main
      - dev
    paths:
      - .github/workflows/cicd-finnhub-mcp-server.yml
      - .gitleaks.toml
      - mcp/finnhub-mcp-server/**
      - apps/platform/kmcp/resources/finnhub-mcp-server.yaml

concurrency:
  group: cicd-finnhub-mcp-server-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.25.8"
  KMCP_VERSION: "v0.2.7"
  PROJECT_DIR: mcp/finnhub-mcp-server
  DOCKERFILE_PATH: mcp/finnhub-mcp-server/Dockerfile
  DEPLOYMENT_MANIFEST: apps/platform/kmcp/resources/finnhub-mcp-server.yaml
  IMAGE_NAME: ghcr.io/shkirmantsev/finnhub-mcp-server
  HADOLINT_IMAGE: hadolint/hadolint:v2.14.0
  GITLEAKS_IMAGE: ghcr.io/gitleaks/gitleaks:v8.29.0
  TRIVY_IMAGE: aquasec/trivy:0.69.3

jobs:
  metadata:
    name: Resolve build metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_ref: ${{ steps.version.outputs.image_ref }}
      should_publish: ${{ steps.publish_guard.outputs.should_publish }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read version from kmcp.yaml
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(awk -F': *' '$1=="version" {print $2; exit}' "${PROJECT_DIR}/kmcp.yaml" | tr -d '"' | xargs)"

          if [[ -z "${version}" ]]; then
            echo "Unable to resolve version from ${PROJECT_DIR}/kmcp.yaml" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "image_ref=${IMAGE_NAME}:${version}" >> "${GITHUB_OUTPUT}"

      - name: Decide whether publishing is allowed
        id: publish_guard
        shell: bash
        run: |
          set -euo pipefail

          should_publish=false
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]] \
             && [[ "${GITHUB_REF_NAME}" == "main" || "${GITHUB_REF_NAME}" == "dev" ]] \
             && [[ ! "${GITHUB_ACTOR}" =~ \[bot\]$ ]]; then
            should_publish=true
          fi

          echo "should_publish=${should_publish}" >> "${GITHUB_OUTPUT}"

  quality:
    name: Lint, secret scan and Go validation
    runs-on: ubuntu-latest
    needs: metadata
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint Dockerfile with Hadolint
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${HADOLINT_IMAGE}"
          docker run --rm \
            -i \
            -v "${PWD}:/repo" \
            --workdir /repo \
            "${HADOLINT_IMAGE}" \
            hadolint "${DOCKERFILE_PATH}"

      - name: Scan repository for secrets with Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${GITLEAKS_IMAGE}"
          docker run --rm \
            -v "${PWD}:/repo" \
            --workdir /repo \
            "${GITLEAKS_IMAGE}" \
            dir \
            --config /repo/.gitleaks.toml \
            --no-banner \
            --redact \
            --exit-code 1 \
            /repo

      - name: Set up Go
        uses: actions/setup-go@v6.3.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: ${{ env.PROJECT_DIR }}/go.sum

      - name: Download Go modules
        working-directory: ${{ env.PROJECT_DIR }}
        run: go mod download

      - name: Run Go tests
        working-directory: ${{ env.PROJECT_DIR }}
        run: go test ./...

      - name: Run Go vet
        working-directory: ${{ env.PROJECT_DIR }}
        run: go vet ./...

      - name: Validate kmcp project packaging
        shell: bash
        run: |
          set -euo pipefail
          go install "github.com/kagent-dev/kmcp/cmd/kmcp@${KMCP_VERSION}"
          "$(go env GOPATH)/bin/kmcp" build \
            --project-dir "${PROJECT_DIR}" \
            --platform linux/amd64 \
            --tag "local/finnhub-mcp-server:${{ needs.metadata.outputs.version }}"

      - name: Verify deployment manifest image tag matches kmcp version
        shell: bash
        run: |
          set -euo pipefail

          manifest_image="$(awk '/image:/ {print $2; exit}' "${DEPLOYMENT_MANIFEST}")"
          manifest_tag="${manifest_image##*:}"
          expected_tag="${{ needs.metadata.outputs.version }}"

          if [[ "${manifest_tag}" != "${expected_tag}" ]]; then
            echo "Version mismatch detected." >&2
            echo "Manifest image: ${manifest_image}" >&2
            echo "Expected tag : ${expected_tag}" >&2
            exit 1
          fi

  publish:
    name: Build, scan and publish image
    runs-on: ubuntu-latest
    needs:
      - metadata
      - quality
    if: needs.metadata.outputs.should_publish == 'true'
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether image version already exists in GHCR
        id: image_exists
        shell: bash
        run: |
          set -euo pipefail

          if docker manifest inspect "${{ needs.metadata.outputs.image_ref }}" >/dev/null 2>&1; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "Image already exists: ${{ needs.metadata.outputs.image_ref }}" >> "${GITHUB_STEP_SUMMARY}"
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
            echo "Image does not exist yet: ${{ needs.metadata.outputs.image_ref }}" >> "${GITHUB_STEP_SUMMARY}"
          fi

      - name: Set up QEMU
        if: steps.image_exists.outputs.exists != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.image_exists.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Build local amd64 image for vulnerability scan
        if: steps.image_exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.PROJECT_DIR }}
          file: ./${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64
          load: true
          push: false
          tags: ${{ needs.metadata.outputs.image_ref }}

      - name: Scan image with Trivy before push
        if: steps.image_exists.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker pull "${TRIVY_IMAGE}"
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            "${TRIVY_IMAGE}" \
            image \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --exit-code 1 \
            "${{ needs.metadata.outputs.image_ref }}"

      - name: Build and push multi-arch image
        if: steps.image_exists.outputs.exists != 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./${{ env.PROJECT_DIR }}
          file: ./${{ env.DOCKERFILE_PATH }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ needs.metadata.outputs.image_ref }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.metadata.outputs.version }}

      - name: Inspect published image manifest
        if: steps.image_exists.outputs.exists != 'true'
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${{ needs.metadata.outputs.image_ref }}"

      - name: Write publish summary
        if: steps.image_exists.outputs.exists != 'true'
        shell: bash
        run: |
          {
            echo "Published multi-arch image:"
            echo "- ${{ needs.metadata.outputs.image_ref }}"
            echo "- platforms: linux/amd64, linux/arm64"
          } >> "${GITHUB_STEP_SUMMARY}"
